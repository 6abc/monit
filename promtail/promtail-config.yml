server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /data/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # System logs on the monitoring host itself
  - job_name: syslog
    static_configs:
      - targets: ['localhost']
        labels:
          job: syslog
          host: monitoring
          __path__: /var/log/{syslog,auth.log,kern.log,dpkg.log}

  # Docker container logs (JSON log driver, mounted read-only from the host)
  - job_name: docker-containers
    static_configs:
      - targets: ['localhost']
        labels:
          job: docker
          host: monitoring
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          stream:
      - output:
          source: output
